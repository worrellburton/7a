name: CI

# Build gate for PRs into main. The deploy itself runs on Vercel
# (via the GitHub integration that posts the "Vercel" status check);
# this workflow exists so branch protection has a Next.js
# typecheck + production build to gate merges on. Anything that
# typechecks and `next build`s clean here will deploy fine on Vercel.
#
# Job name MUST stay `build` — branch protection on main requires
# a status check by that literal name.

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Build-time placeholders so Next.js' static-prerender of marketing
      # pages doesn't bail on the "missing env var" guard. The values
      # don't have to reach a real Supabase project — no request fires
      # during `next build`; the guards just want SOMETHING non-empty
      # so the module-level Supabase client instantiates.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: API gate coverage
        # Fails the build if any new src/app/api/**/route.ts is
        # added without importing a centralised auth gate (or
        # being explicitly grandfathered in
        # scripts/api-gates-allowlist.txt). Lets us close the
        # gating drift incrementally — every conversion shrinks
        # the allowlist — without risking a one-shot 179-file
        # rewrite. See the script header for the policy.
        run: node scripts/check-api-gates.mjs
      - name: Build
        run: npm run build
